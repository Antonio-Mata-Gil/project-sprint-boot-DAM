################################################################################
# APPLICATION-TEST.PROPERTIES - Configuración para Testing
# 
# Este profile se activa con: @ActiveProfiles("test")
# Utiliza H2 en memoria para pruebas rápidas y aisladas
################################################################################

# ====== CONFIGURACIÓN DE DATASOURCE H2 EN MEMORIA ======
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ====== CONFIGURACIÓN DE JPA/HIBERNATE ======
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# ====== LOGGING ======
logging.level.root=WARN
logging.level.backen_examen.demo=DEBUG
