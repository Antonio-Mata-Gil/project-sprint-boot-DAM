app = "project-sprint-boot-dam"
primary_region = "fra"

[build]

[http_service]
  internal_port = 8082
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "60s"
    interval = "15s"
    timeout = "10s"
    type = "tcp"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
